<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>任务四象限 · 智能日程助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(145deg, #f0f4ff 0%, #e6edf7 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 1.5rem 1rem 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .todo-card {
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* ===== 头部 ===== */
        .header {
            background: white;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-left h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e2b6e, #2a3f8e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-left .sub {
            font-size: 0.72rem;
            color: #6c7a91;
            border-left: 2px solid #2a6df4;
            padding-left: 0.5rem;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .clock-widget { text-align: right; line-height: 1.3; }
        .clock-time { font-size: 1.2rem; font-weight: 700; color: #1e293b; font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace; font-variant-numeric: tabular-nums; }
        .clock-date { font-size: 0.7rem; color: #6c7a91; }
        .gear-btn {
            background: none; border: 1px solid #e2e8f0;
            color: #64748b; font-size: 1.1rem;
            cursor: pointer; padding: 5px 8px;
            border-radius: 10px; transition: all 0.15s; line-height: 1;
        }
        .gear-btn:hover { background: #f1f5f9; color: #1e293b; }

        /* ===== 输入区 ===== */
        .add-area {
            padding: 1rem 1.5rem 0.8rem;
            background: white;
        }
        .input-group {
            display: flex; gap: 10px; align-items: center;
            background: #f8fafd;
            border-radius: 50px;
            padding: 3px 3px 3px 18px;
            border: 1px solid #e2e9f2;
            transition: all 0.2s;
        }
        .input-group:focus-within {
            border-color: #2a6df4;
            box-shadow: 0 0 0 3px rgba(42, 109, 244, 0.15);
            background: white;
        }
        #taskInput {
            flex: 1; border: none; background: transparent;
            padding: 12px 0; font-size: 0.95rem;
            font-weight: 500; color: #1e293b; outline: none;
        }
        #taskInput::placeholder { color: #9aa9bf; font-weight: 400; }
        .add-btn {
            background: linear-gradient(105deg, #2a6df4, #1e4fcf);
            border: none; color: white; font-weight: 600;
            font-size: 0.9rem; padding: 9px 20px;
            border-radius: 50px; cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(42, 109, 244, 0.3);
            white-space: nowrap;
        }
        .add-btn:hover { transform: scale(0.97); }
        .add-btn:active { transform: scale(0.95); }
        .add-btn.loading { pointer-events: none; opacity: 0.7; background: linear-gradient(105deg, #94a3b8, #64748b); }
        .shake { animation: shakeBlink 0.3s ease-in-out 0s 2; border-color: #f97316 !important; background: #fff4e8 !important; }
        @keyframes shakeBlink {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

        /* ===== 区域标题 ===== */
        .section-title {
            display: flex; align-items: center; gap: 8px;
            padding: 0.9rem 1.5rem 0.5rem;
            font-size: 0.85rem; font-weight: 700;
            color: #334155;
            background: white;
            user-select: none;
        }
        .section-title .dot { width: 8px; height: 8px; border-radius: 50%; }
        .section-title.collapsible { cursor: pointer; }
        .section-title.collapsible:hover { color: #1e5be0; }
        .collapse-icon { font-size: 0.7rem; transition: transform 0.2s; margin-left: auto; }
        .collapse-icon.collapsed { transform: rotate(-90deg); }

        /* ===== 优先级排序列表 ===== */
        .priority-list-wrap {
            padding: 0.3rem 1.5rem 0.8rem;
            background: white;
            border-bottom: 1px solid #f1f5f9;
        }
        .priority-list { list-style: none; display: flex; flex-direction: column; gap: 6px; max-height: 460px; overflow-y: auto; padding-right: 4px; }
        .priority-list::-webkit-scrollbar { width: 4px; }
        .priority-list::-webkit-scrollbar-track { background: #eef2f8; border-radius: 10px; }
        .priority-list::-webkit-scrollbar-thumb { background: #cbd9ed; border-radius: 10px; }
        .p-row {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid #f8fafc;
        }
        .p-num {
            font-size: 0.75rem; font-weight: 700; color: #94a3b8;
            min-width: 32px; text-align: right; flex-shrink: 0;
        }
        .p-num.top1 { color: #eab308; }
        .p-num.top2 { color: #94a3b8; }
        .p-num.top3 { color: #cd7b54; }
        .p-item {
            flex: 1; display: flex; align-items: center; gap: 8px;
            background: #fafbfd; border-radius: 12px;
            padding: 8px 14px; min-width: 0;
            transition: all 0.15s; border: 1px solid transparent;
        }
        .p-item:hover { background: #f0f4ff; border-color: #dbeafe; }
        .p-check { width: 19px; height: 19px; cursor: pointer; accent-color: #2a6df4; flex-shrink: 0; }
        .p-label {
            flex: 1; font-size: 0.9rem; font-weight: 600; color: #1e293b;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
        }
        .p-item.completed .p-label { text-decoration: line-through; color: #94a3b8; font-weight: 400; }
        .p-cat {
            font-size: 0.63rem; font-weight: 700; padding: 2px 7px;
            border-radius: 10px; white-space: nowrap; flex-shrink: 0;
        }
        .cat-会议安排 { background: #dbeafe; color: #1e40af; }
        .cat-作业限期 { background: #fce7f3; color: #9d174d; }
        .cat-信息提交 { background: #e0e7ff; color: #3730a3; }
        .cat-生活琐事 { background: #d1fae5; color: #065f46; }
        .cat-其他, .cat-需跟进 { background: #f1f5f9; color: #475569; }
        .p-time {
            font-size: 0.72rem; font-weight: 500; color: #64748b;
            white-space: nowrap; flex-shrink: 0; min-width: 110px; text-align: right;
        }
        .p-time.urgent { color: #e5484d; font-weight: 700; }
        .p-del {
            background: none; border: none; font-size: 1rem;
            cursor: pointer; color: #cbd5e1; padding: 2px 4px;
            border-radius: 6px; flex-shrink: 0; line-height: 1;
            transition: all 0.15s;
        }
        .p-del:hover { background: #fee2e2; color: #e5484d; }

        .p-empty {
            text-align: center; padding: 2rem 1rem;
            color: #a3b3ce; font-size: 0.85rem;
        }

        /* ===== 总任务清单（可折叠） ===== */
        .all-tasks-wrap {
            padding: 0.3rem 1.5rem 0.8rem;
            background: white;
            border-bottom: 1px solid #f1f5f9;
        }
        .all-tasks-wrap.collapsed { display: none; }
        .all-task-row {
            display: flex; align-items: center; gap: 10px;
            padding: 5px 0;
            border-bottom: 1px solid #fafbfd;
        }
        .all-check { width: 18px; height: 18px; cursor: pointer; accent-color: #2a6df4; flex-shrink: 0; }
        .all-label {
            flex: 1; font-size: 0.85rem; font-weight: 500; color: #1e293b;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
        }
        .all-task-row.completed .all-label { text-decoration: line-through; color: #94a3b8; }
        .all-cat {
            font-size: 0.6rem; font-weight: 700; padding: 1px 6px;
            border-radius: 8px; white-space: nowrap; flex-shrink: 0;
        }
        .all-time {
            font-size: 0.68rem; color: #94a3b8; white-space: nowrap; flex-shrink: 0;
        }
        .all-del {
            background: none; border: none; font-size: 0.85rem;
            cursor: pointer; color: #cbd5e1; padding: 2px 4px;
            border-radius: 4px; flex-shrink: 0; transition: all 0.15s;
        }
        .all-del:hover { background: #fee2e2; color: #e5484d; }

        /* ===== 四象限图 ===== */
        .chart-wrap {
            padding: 0.8rem 1.5rem 1rem;
            background: white;
            position: relative;
        }
        .chart-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1.4 / 1;
            max-height: 420px;
            background: #fafbfe;
            border-radius: 16px;
            border: 1px solid #e8ecf1;
            overflow: hidden;
        }
        #quadrantChart { width: 100%; height: 100%; display: block; cursor: crosshair; }

        .chart-tooltip {
            display: none;
            position: absolute;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.92);
            color: #f1f5f9;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.78rem;
            line-height: 1.5;
            max-width: 240px;
            z-index: 10;
            white-space: nowrap;
        }
        .chart-tooltip .tt-label { font-size: 0.9rem; font-weight: 700; color: white; }
        .chart-tooltip .tt-cat { color: #cbd5e1; }
        .chart-legend {
            display: flex; gap: 12px; flex-wrap: wrap;
            padding: 0.6rem 0 0; justify-content: center;
        }
        .chart-legend-item {
            font-size: 0.65rem; font-weight: 600;
            padding: 2px 10px; border-radius: 10px;
            display: flex; align-items: center; gap: 4px;
        }
        .legend-救火区 { background: #fee2e2; color: #b91c1c; }
        .legend-投资区 { background: #ede9fe; color: #6b21a8; }
        .legend-干扰区 { background: #fef9c3; color: #a16207; }
        .legend-黑洞区 { background: #f1f5f9; color: #64748b; }

        /* ===== 底部栏 ===== */
        .stats-bar {
            padding: 0.8rem 1.5rem 1.2rem;
            background: white;
            border-top: 1px solid #eff3fa;
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 10px;
        }
        .counter {
            background: #eef3fe; padding: 5px 12px;
            border-radius: 30px; font-size: 0.75rem;
            font-weight: 600; color: #1e5be0;
        }
        .clear-completed {
            background: none; border: 1px solid #e0e8f2;
            padding: 5px 16px; border-radius: 30px;
            font-size: 0.75rem; font-weight: 500;
            color: #5f6e88; cursor: pointer; transition: all 0.2s;
        }
        .clear-completed:hover { background: #fef2f2; border-color: #f3b7b7; color: #e5484d; }

        /* ===== 设置面板 ===== */
        .settings-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.35); z-index: 99;
            opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .settings-overlay.open { opacity: 1; pointer-events: auto; }
        .settings-panel {
            position: fixed; top: 0; right: -420px;
            width: 400px; max-width: 90vw; height: 100vh;
            background: white; z-index: 100;
            box-shadow: -10px 0 30px rgba(0,0,0,0.15);
            padding: 1.5rem; overflow-y: auto;
            transition: right 0.3s ease;
            display: flex; flex-direction: column; gap: 0.8rem;
        }
        .settings-panel.open { right: 0; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; }
        .settings-header h3 { font-size: 1.1rem; color: #1e293b; }
        .settings-close {
            background: none; border: none; font-size: 1.3rem;
            cursor: pointer; color: #94a3b8; padding: 4px 8px; border-radius: 8px;
        }
        .settings-close:hover { background: #f1f5f9; color: #1e293b; }
        .settings-section {
            background: #f8fafc; border-radius: 12px;
            padding: 0.8rem; border: 1px solid #e2e8f0;
        }
        .settings-section h4 { font-size: 0.8rem; color: #475569; margin-bottom: 0.4rem; }
        .settings-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
        .settings-row label { font-size: 0.73rem; color: #64748b; white-space: nowrap; }
        .settings-row input, .settings-row select {
            border: 1px solid #e2e8f0; border-radius: 6px;
            padding: 3px 8px; font-size: 0.75rem; width: 75px; background: white;
        }
        .settings-row input:focus { border-color: #2a6df4; outline: none; }
        .settings-save {
            background: linear-gradient(105deg, #2a6df4, #1e4fcf);
            color: white; border: none; font-weight: 600;
            font-size: 0.85rem; padding: 9px 20px;
            border-radius: 30px; cursor: pointer; transition: all 0.2s;
        }
        .settings-save:hover { transform: scale(0.98); }

        .star-toggle {
            background: none; border: none; cursor: pointer;
            font-size: 0.9rem; padding: 2px 4px; border-radius: 8px;
            transition: all 0.15s; opacity: 0.35; flex-shrink: 0;
        }
        .star-toggle:hover { opacity: 0.8; }
        .star-toggle.active { opacity: 1; }

        /* 移动端 */
        @media (max-width: 600px) {
            body { padding: 0.3rem; }
            .header { padding: 0.8rem; }
            .header-left h1 { font-size: 1.1rem; }
            .section-title { font-size: 0.78rem; padding: 0.7rem 0.8rem 0.3rem; }
            .add-area, .priority-list-wrap, .all-tasks-wrap, .chart-wrap, .stats-bar { padding-left: 0.6rem; padding-right: 0.6rem; }
            .p-time { display: none; }
            .all-time { display: none; }
            .p-cat { font-size: 0.58rem; padding: 1px 5px; }
            .p-label { font-size: 0.82rem; }
            .p-item { padding: 6px 10px; gap: 6px; }
            .p-num { min-width: 24px; font-size: 0.68rem; }
            .chart-container { max-height: 240px; }
            .chart-wrap { padding-bottom: 0.5rem; }
            .settings-panel { width: 100vw; max-width: 100vw; right: -105vw; }
            .clock-time { font-size: 1rem; }
            .clock-date { font-size: 0.65rem; }
            .add-btn { padding: 8px 16px; font-size: 0.82rem; }
            #taskInput { font-size: 0.88rem; }
        }
    </style>
</head>
<body>

<div class="todo-card">
    <!-- 头部 -->
    <div class="header">
        <div class="header-left">
            <h1>📊 任务四象限</h1>
            <div class="sub">智能分类 · 优先级排序 · 直观可视</div>
        </div>
        <div class="header-right">
            <div class="clock-widget">
                <div class="clock-time" id="clockTime">--:--</div>
                <div class="clock-date" id="clockDate">----年--月--日 周-</div>
            </div>
            <button class="gear-btn" id="gearBtn" title="提醒设置">⚙</button>
        </div>
    </div>

    <!-- 输入区 -->
    <div class="add-area">
        <div class="input-group" id="inputGroup">
            <input type="text" id="taskInput" placeholder="写一条待办，比如「明早八点开会」或「跟进审批进度」" autocomplete="off">
            <button class="add-btn" id="addTaskBtn">+ 添加</button>
        </div>
    </div>

    <!-- 当前建议排序 -->
    <div class="section-title">
        <span class="dot" style="background:#2a6df4;"></span> 当前建议排序
        <span style="font-size:0.65rem;color:#94a3b8;font-weight:400;">（排除黑洞区，按四象限排序）</span>
    </div>
    <div class="priority-list-wrap">
        <div class="priority-list" id="priorityList"></div>
        <div class="p-empty" id="priorityEmpty">✨ 暂无优先任务</div>
    </div>

    <!-- 总任务清单（可折叠） -->
    <div class="section-title collapsible" id="allTasksHeader">
        <span class="dot" style="background:#64748b;"></span> 总任务清单
        <span class="collapse-icon" id="collapseIcon">▾</span>
    </div>
    <div class="all-tasks-wrap" id="allTasksWrap">
        <div class="priority-list" id="allTasksList"></div>
        <div class="p-empty" id="allTasksEmpty">🌸 暂无任务，添加第一条吧</div>
    </div>

    <!-- 四象限图 -->
    <div class="section-title">
        <span class="dot" style="background:#8b5cf6;"></span> 四象限视图
        <span style="font-size:0.65rem;color:#94a3b8;font-weight:400;">悬停查看详情</span>
    </div>
    <div class="chart-wrap">
        <div class="chart-container" id="chartContainer">
            <canvas id="quadrantChart"></canvas>
            <div class="chart-tooltip" id="chartTooltip"></div>
        </div>
        <div class="chart-legend">
            <span class="chart-legend-item legend-救火区">🔥 救火区</span>
            <span class="chart-legend-item legend-投资区">💎 投资区</span>
            <span class="chart-legend-item legend-干扰区">⚡ 干扰区</span>
            <span class="chart-legend-item legend-黑洞区">🕳 黑洞区</span>
        </div>
    </div>

    <!-- 底部栏 -->
    <div class="stats-bar">
        <div class="counter" id="taskCounter">0 项待完成</div>
        <button class="clear-completed" id="clearCompletedBtn">✨ 清除已完成</button>
    </div>
</div>

<!-- 设置面板 -->
<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
        <h3>⚙ 提醒设置</h3>
        <button class="settings-close" id="settingsClose">✕</button>
    </div>
    <div class="settings-section">
        <h4>📚 学业相关（作业限期）</h4>
        <div class="settings-row">
            <label>提醒次数</label><input type="number" id="sEduCount" min="0" max="5" value="2">
            <label>提前</label>
            <select id="sEduR1"><option value="10080">7天</option><option value="4320">3天</option><option value="1440">1天</option></select>
            <select id="sEduR2"><option value="4320">3天</option><option value="1440">1天</option><option value="120">2小时</option></select>
        </div>
    </div>
    <div class="settings-section">
        <h4>💼 工作相关（会议 / 提交）</h4>
        <div class="settings-row">
            <label>提醒次数</label><input type="number" id="sWorkCount" min="0" max="5" value="2">
            <label>提前</label>
            <select id="sWorkR1"><option value="2880">2天</option><option value="1440">1天</option><option value="10080">7天</option></select>
            <select id="sWorkR2"><option value="120">2小时</option><option value="60">1小时</option><option value="1440">1天</option></select>
        </div>
    </div>
    <div class="settings-section">
        <h4>🏠 生活相关</h4>
        <div class="settings-row">
            <label>提醒次数</label><input type="number" id="sLifeCount" min="0" max="5" value="1">
            <label>提前</label>
            <select id="sLifeR1"><option value="720">12小时</option><option value="1440">1天</option><option value="120">2小时</option></select>
        </div>
    </div>
    <div class="settings-section">
        <h4>🎮 休闲相关</h4>
        <div class="settings-row">
            <label>提醒次数</label><input type="number" id="sPlayCount" min="0" max="5" value="0">
        </div>
    </div>
    <div class="settings-section">
        <h4>🔄 跟进任务默认间隔</h4>
        <div class="settings-row">
            <label>检查间隔</label>
            <select id="sFollowupInterval">
                <option value="720">每12小时</option><option value="1440">每天</option><option value="2880">每2天</option>
                <option value="4320">每3天</option><option value="7200" selected>每5天</option><option value="10080">每周</option>
            </select>
        </div>
    </div>
    <div class="settings-section">
        <h4>⏰ 紧急度阈值</h4>
        <div class="settings-row"><label>高紧急 &lt;</label><input type="number" id="sUrgentHigh" min="1" max="48" value="4"> 小时</div>
        <div class="settings-row"><label>中紧急 &lt;</label><input type="number" id="sUrgentMid" min="1" max="168" value="24"> 小时</div>
    </div>
    <button class="settings-save" id="settingsSaveBtn">💾 保存设置</button>
</div>

<script>
    // ==================== 数据 & 配置 ====================
    const STORAGE_KEY = 'vibe_todo_list';
    const SETTINGS_KEY = 'vibe_settings';

    const LLM_CONFIG = {
        baseUrl: 'https://api.deepseek.com',
        apiKey: 'sk-bf51236eafd94551916ba18b5854098b',
        model: 'deepseek-chat'
    };

    const DEFAULT_SETTINGS = {
        education: { reminders: [10080, 4320] },
        work: { reminders: [2880, 120] },
        life: { reminders: [720] },
        play: { reminders: [] },
        followupInterval: 7200,
        urgentHigh: 4,
        urgentMid: 24,
    };

    let tasks = [];
    let settings = { ...DEFAULT_SETTINGS };
    let allTasksCollapsed = false;

    // ==================== DOM ====================
    const priorityListEl = document.getElementById('priorityList');
    const priorityEmptyEl = document.getElementById('priorityEmpty');
    const allTasksListEl = document.getElementById('allTasksList');
    const allTasksEmptyEl = document.getElementById('allTasksEmpty');
    const allTasksWrap = document.getElementById('allTasksWrap');

    function loadSettings() {

    function getRemindersForCategory(cat) {
        const map = { '作业限期': 'education', '会议安排': 'work', '信息提交': 'work', '生活琐事': 'life', '其他': 'play' };
        return [...(settings[map[cat] || 'play']?.reminders || [])];
    }

    function isImportantCategory(cat) { return ['作业限期', '会议安排', '信息提交'].includes(cat); }

    // ==================== 四象限引擎 ====================
    function computeQuadrant(task, now = new Date()) {
        let important = false;
        if (task.userImportant !== null && task.userImportant !== undefined) {
            important = task.userImportant;
        } else {
            important = isImportantCategory(task.category) || (task.priority >= 4);
        }
        let urgent = false;
        let urgencyScore = 0;

        if (task.taskType === 'followup' && task.nextCheckTime) {
            const nc = new Date(task.nextCheckTime);
            const diffH = (nc - now) / 3600000;
            if (diffH <= 0) { urgent = true; urgencyScore = 1.0; }
            else if (diffH <= settings.urgentHigh) { urgent = true; urgencyScore = 0.8; }
            else if (diffH <= settings.urgentMid) { urgencyScore = 0.5; }
            else { urgencyScore = 0.15; }
        } else if (task.dueTimestamp) {
            const due = new Date(task.dueTimestamp);
            const diffH = (due - now) / 3600000;
            if (diffH <= 0) { urgent = true; urgencyScore = 1.0; }
            else if (diffH <= settings.urgentHigh) { urgent = true; urgencyScore = 0.85; }
            else if (diffH <= settings.urgentMid) { urgencyScore = 0.55; }
            else { urgencyScore = Math.max(0.05, 0.3 - diffH / 720); }
        }

        if (task.category === '其他' && task.priority <= 1 && task.userImportant !== true) {
            urgent = false; urgencyScore = 0;
        }

        let quadrant;
        if (important && urgent) quadrant = '救火区';
        else if (important && !urgent) quadrant = '投资区';
        else if (!important && urgent) quadrant = '干扰区';
        else quadrant = '黑洞区';

        const quadOrder = { '救火区': 0, '投资区': 1, '干扰区': 2, '黑洞区': 3 };
        const sortKey = quadOrder[quadrant] * 1000 - urgencyScore * 100 - (task.priority || 1) * 10;

        return { quadrant, important, urgent, urgencyScore, sortKey };
    }

    function getImportanceScore(task) {
        if (task.userImportant === true) return 0.85;
        if (task.userImportant === false) return 0.15;
        const catImp = isImportantCategory(task.category) ? 0.6 : 0.2;
        const priImp = (task.priority || 1) / 5;
        return Math.max(0.05, Math.min(0.95, (catImp + priImp) / 2));
    }

    function sortTasks(taskList) {
        const now = new Date();
        const hour = now.getHours();
        const isMorning = hour < 12;
        const scored = taskList.map(t => ({ task: t, quad: computeQuadrant(t, now) }));
        scored.sort((a, b) => {
            if (a.quad.quadrant === '黑洞区' && b.quad.quadrant !== '黑洞区') return 1;
            if (b.quad.quadrant === '黑洞区' && a.quad.quadrant !== '黑洞区') return -1;
            if (a.quad.quadrant === '黑洞区' && b.quad.quadrant === '黑洞区') return 0;
            if (isMorning) {
                if (a.quad.quadrant === '投资区' && b.quad.quadrant === '干扰区') return -1;
                if (b.quad.quadrant === '投资区' && a.quad.quadrant === '干扰区') return 1;
            } else {
                if (a.quad.quadrant === '干扰区' && b.quad.quadrant === '投资区') return -1;
                if (b.quad.quadrant === '干扰区' && a.quad.quadrant === '投资区') return 1;
            }
            return a.quad.sortKey - b.quad.sortKey;
        });
        return scored.map(s => s.task);
    }

    // ==================== 四象限散点图 (Canvas) ====================
    function renderQuadrantChart() {
        if (!quadrantCanvas) return;
        const container = chartContainer;
        const rect = container.getBoundingClientRect();
        const W = rect.width, H = rect.height;
        if (W <= 0 || H <= 0) return;

        const dpr = window.devicePixelRatio || 1;
        quadrantCanvas.width = W * dpr;
        quadrantCanvas.height = H * dpr;
        quadrantCanvas.style.width = W + 'px';
        quadrantCanvas.style.height = H + 'px';

        const ctx = quadrantCanvas.getContext('2d');
        ctx.scale(dpr, dpr);

        const pad = { top: 10, right: 10, bottom: 10, left: 10 };
        const pw = W - pad.left - pad.right;
        const ph = H - pad.top - pad.bottom;
        const cx = pad.left + pw / 2;
        const cy = pad.top + ph / 2;

        // 背景
        ctx.fillStyle = '#fafbfe';
        ctx.fillRect(0, 0, W, H);

        // 象限背景色（柔和）
        ctx.fillStyle = 'rgba(254,226,226,0.5)';
        ctx.fillRect(cx, pad.top, pw / 2, ph / 2);
        ctx.fillStyle = 'rgba(237,233,254,0.5)';
        ctx.fillRect(cx, cy, pw / 2, ph / 2);
        ctx.fillStyle = 'rgba(254,249,195,0.5)';
        ctx.fillRect(pad.left, pad.top, pw / 2, ph / 2);
        ctx.fillStyle = 'rgba(241,245,249,0.45)';
        ctx.fillRect(pad.left, cy, pw / 2, ph / 2);

        // 坐标轴
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(cx, pad.top); ctx.lineTo(cx, H - pad.bottom);
        ctx.moveTo(pad.left, cy); ctx.lineTo(W - pad.right, cy);
        ctx.stroke();

        // 轴箭头
        ctx.fillStyle = '#94a3b8';
        ctx.font = '10px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('重要 →', W - pad.right - 24, cy - 6);
        ctx.textAlign = 'left';
        ctx.fillText('紧急 ↑', cx + 4, pad.top + 12);

        // 象限标签（居中于每个格子）
        const qw = pw / 2, qh = ph / 2;
        const labels = [
            { text: '救火区', sub: '重要且紧急', qx: cx + qw / 2, qy: pad.top + qh * 0.38, color: '#b91c1c' },
            { text: '投资区', sub: '重要不紧急', qx: cx + qw / 2, qy: cy + qh * 0.38, color: '#6b21a8' },
            { text: '干扰区', sub: '不重要紧急', qx: pad.left + qw / 2, qy: pad.top + qh * 0.38, color: '#a16207' },
            { text: '黑洞区', sub: '不重要不紧急', qx: pad.left + qw / 2, qy: cy + qh * 0.38, color: '#64748b' },
        ];
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (const lb of labels) {
            ctx.fillStyle = lb.color;
            ctx.font = 'bold 12px system-ui';
            ctx.fillText(lb.text, lb.qx, lb.qy);
            ctx.fillStyle = lb.color.replace(/[^,]+$/, '0.7)').replace('rgb', 'rgba');
            ctx.font = '10px system-ui';
            ctx.fillText(lb.sub, lb.qx, lb.qy + 16);
        }

        // 绘制任务点
        const active = tasks.filter(t => !t.completed);
        const taskPoints = [];
        const pointColors = { '救火区': '#dc2626', '投资区': '#7c3aed', '干扰区': '#ca8a04', '黑洞区': '#94a3b8' };

        active.forEach(task => {
            const q = computeQuadrant(task);
            const imp = getImportanceScore(task);
            const urg = q.urgencyScore;
            const x = pad.left + imp * pw;
            const y = pad.top + (1 - urg) * ph;
            taskPoints.push({ task, q, x, y });
        });

        // 先画光圈再画点
        taskPoints.forEach(p => {
            const color = pointColors[p.q.quadrant] || '#94a3b8';
            // 半透明光圈
            ctx.beginPath();
            ctx.arc(p.x, p.y, 7.5, 0, Math.PI * 2);
            ctx.fillStyle = color.replace(')', ',0.2)').replace('rgb', 'rgba');
            ctx.fill();
            // 实心小点
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3.2, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            p.hitR = 10;
        });

        quadrantCanvas._taskPoints = taskPoints;
    }

    function getCanvasPos(e) {
        const rect = quadrantCanvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    quadrantCanvas.addEventListener('mousemove', function(e) {
        const pos = getCanvasPos(e);
        const points = quadrantCanvas._taskPoints || [];
        let found = null;
        for (const p of points) {
            if (Math.hypot(pos.x - p.x, pos.y - p.y) < p.hitR) { found = p; break; }
        }
        if (found) {
            const t = found.task, q = found.q;
            const dueStr = t.dueTimestamp
                ? new Date(t.dueTimestamp).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false })
                : (t.taskType === 'followup' ? '跟进中' : '无截止');
            chartTooltip.innerHTML =
                `<div class="tt-label">${t.label||t.text}</div>` +
                `<div class="tt-cat">${t.category||''} · ${'★'.repeat(t.priority)}${'☆'.repeat(5-t.priority)}</div>` +
                `<div>📍 ${q.quadrant} | ⏰ ${dueStr}</div>` +
                (t.notes && t.notes !== t.label ? `<div style="color:#94a3b8;font-size:0.7rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;">📝 ${t.notes.substring(0,60)}</div>` : '');
            chartTooltip.style.display = 'block';
            const cr = chartContainer.getBoundingClientRect();
            const tl = chartTooltip.getBoundingClientRect();
            let tx = pos.x + 14, ty = pos.y - tl.height / 2;
            if (tx + tl.width > cr.width - 4) tx = pos.x - tl.width - 14;
            if (ty < 4) ty = 4;
            if (ty + tl.height > cr.height - 4) ty = cr.height - tl.height - 4;
            chartTooltip.style.left = tx + 'px';
            chartTooltip.style.top = ty + 'px';
            quadrantCanvas.style.cursor = 'pointer';
        } else {
            chartTooltip.style.display = 'none';
            quadrantCanvas.style.cursor = 'crosshair';
        }
    });

    quadrantCanvas.addEventListener('mouseleave', function() { chartTooltip.style.display = 'none'; });

    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(renderQuadrantChart, 200); });

    // ==================== LLM 分析 ====================
    async function analyzeTaskWithLLM(text) {
        const nowStr = new Date().toLocaleString('zh-CN', { hour12: false });
        const systemPrompt = `你是一个智能日程分析助手。分析用户输入的口语化待办文本，完成以下任务：

首先判断意图（intent）：
- task：用户自己在安排要做的事（主语是"我"或隐含自己做）。含时间词=给自己的日程。
- chat：提问、求助、闲聊、让你帮忙做事。"帮我写论文"=chat不是task。

1. 当 intent="task" 时，判断 taskType：
   - "deadline"：一次性任务，含时间词均=deadline
   - "followup"：仅当明确含"跟进/查看进度/等回复"才标followup

2. 判断类别（category，严格从下列选一）：
   - 会议安排：会议、开会、碰头、讨论、视频、面试、约见、拜访等
   - 作业限期：作业、论文、essay、ddl、deadline、考试、课程、答辩等
   - 信息提交：申请、提交材料、报名、注册、上传、审核、审批、盖章、填表、ipa等
   - 生活琐事：购物、买菜、缴费、快递、维修、家务、取件等
   - 其他：无法归入以上类别

3. 判断重要程度（priority 1-5），理解内容的内在价值：
   - 有长期价值的个人项目（如"开发网站"、"学Rust"）→ priority 3-4
   - 学业/工作硬性任务 → priority 4-5
   - 普通生活事务 → priority 2-3
   - 无长远价值的消遣 → priority 1-2

4. 提取简洁主标签 label（5-12字），用户原始输入写入 notes。

5. 提取时间/日期信息。含精确时间则 hasDateTime=true。

6. reminders 留空数组即可。

当前时间：${nowStr}

严格返回JSON（不要包含任何其他文字）：
{"intent":"task或chat","taskType":"deadline或followup","label":"主标签","category":"类别","priority":1-5,"notes":"用户原始输入","hasDateTime":true/false,"dateTime":"时间描述"或null,"isoTime":"ISO8601绝对时间"或null,"reminders":[],"cleanTask":"去除时间后的文本","reply":"如果是chat则填回复内容"}`;

        try {
            const r = await fetch(`${LLM_CONFIG.baseUrl}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${LLM_CONFIG.apiKey}` },
                body: JSON.stringify({
                    model: LLM_CONFIG.model,
                    messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: text }],
                    temperature: 0.0, max_tokens: 400,
                }),
            });
            if (!r.ok) throw new Error('API error ' + r.status);
            const data = await r.json();
            const content = data.choices?.[0]?.message?.content || '';
            const m = content.match(/\{[\s\S]*\}/);
            if (m) {
                const result = JSON.parse(m[0]);
                const cat = result.category || '其他';
                return {
                    taskType: result.taskType || 'deadline',
                    label: result.label || result.cleanTask || text,
                    category: cat,
                    priority: result.priority || 1,
                    notes: result.notes || text,
                    reminders: getRemindersForCategory(cat),
                    hasDateTime: !!result.hasDateTime,
                    dateTime: result.dateTime || null,
                    cleanTask: result.cleanTask || text,
                    isoTime: result.isoTime || null,
                };
            }
        } catch (e) { console.warn('LLM error:', e.message); }
        return null;
    }

    // 本地时间提取（LLM失败回退）
    function extractTimeLocal(text) {
        const cnToNum = { '一': 1, '二': 2, '两': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10, '零': 0 };
        function cn2num(s) { if (/^\d+$/.test(s)) return parseInt(s); return cnToNum[s] !== undefined ? cnToNum[s] : (s === '十一' ? 11 : s === '十二' ? 12 : (parseInt(s) || 0)); }
        function normalize(s) { return s.replace(/(十一|十二|十|[一二三四五六七八九两])/g, m => cn2num(m)); }
        const norm = normalize(text);
        const datePrefix = '(明早|明晚|今早|今晚|明天|今天|后天|大后天)';
        const clock = '(\\d{1,2})[点:：时](?:(\\d{1,2})[分]?|(半))?';
        let m = norm.match(new RegExp(datePrefix + '\\s*(早上|上午|中午|下午|傍晚|晚上|凌晨)?\\s*' + clock));
        if (!m) m = norm.match(/(下周[一二三四五六日天]|下下周[一二三四五六日天]|周[一二三四五六日天])\s*(早上|上午|中午|下午|傍晚|晚上|凌晨)?\s*(?:(\d{1,2})[点:：时](?:(\d{1,2})[分]?|(半))?)?/);
        if (!m) m = norm.match(/(\d{1,2})月(\d{1,2})[日号]?\s*(早上|上午|中午|下午|傍晚|晚上|凌晨)?\s*(?:(\d{1,2})[点:：时](?:(\d{1,2})[分]?|(半))?)?/);
        if (!m) m = norm.match(/(早上|上午|中午|下午|傍晚|晚上|凌晨)\s*(\d{1,2})[点:：时](?:(\d{1,2})[分]?|(半))?/);
        if (!m) m = norm.match(/(\d{1,2})[点:：时](?:(\d{1,2})[分]?|(半))(?![月日号])/);
        if (!m) return null;
        const dateTime = m[0];
        const rawPatterns = [
            /(明早|明晚|今早|今晚|明天|今天|后天|大后天)\s*(早上|上午|中午|下午|傍晚|晚上|凌晨)?\s*[一二三四五六七八九十两\d]{1,2}[点:：时](?:[一二三四五六七八九十两\d]{1,2}[分]?|半)?/,
        ];
        let cleanText = text;
        for (const rp of rawPatterns) { const rm = text.match(rp); if (rm) { cleanText = text.replace(rm[0], '').replace(/\s+/g, ' ').trim(); break; } }
        const isoTime = computeAbsoluteTime(dateTime);
        return { taskType: 'deadline', label: cleanText || text, category: '其他', priority: 1, notes: text, reminders: [30], hasDateTime: true, dateTime, cleanTask: cleanText || text, isoTime };
    }

    function computeAbsoluteTime(str) {
        const now = new Date();
        function cn2n(s) {
            const mp = { '一': 1, '二': 2, '两': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10, '零': 0 };
            if (mp[s] !== undefined) return mp[s]; if (s === '十一') return 11; if (s === '十二') return 12; return parseInt(s) || 0;
        }
        function parseTime(s) {
            let h24 = s.match(/(\d{1,2}):(\d{2})/);
            if (h24) return { hour: parseInt(h24[1]), minute: parseInt(h24[2]) };
            let tm = s.match(/([一二三四五六七八九十两\d]{1,2})[点:：时](?:([一二三四五六七八九十两\d]{1,2})[分]?|(半))?/);
            if (!tm) return null;
            let hour = cn2n(tm[1]), minute = tm[2] ? cn2n(tm[2]) : 0;
            if (tm[3] === '半') minute = 30;
            if (/下午|傍晚/.test(s) && hour !== 12) hour += 12;
            else if (/晚上|今晚|明晚/.test(s) && hour < 12) hour += 12;
            else if (/中午/.test(s)) hour = 12;
            return { hour, minute };
        }
        let target = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        if (/(明晚|明天|明早)/.test(str)) target.setDate(target.getDate() + 1);
        else if (/后天/.test(str)) target.setDate(target.getDate() + 2);
        else if (/大后天/.test(str)) target.setDate(target.getDate() + 3);
        const wdMap = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '日': 0, '天': 0 };
        const wm = str.match(/下下?周([一二三四五六日天])/);
        const sm = str.match(/周([一二三四五六日天])/);
        const w = wm || sm;
        if (w && wdMap[w[1]] !== undefined) {
            let daysUntil = wdMap[w[1]] - now.getDay();
            if (str.includes('下下周')) daysUntil += 14;
            else if (str.includes('下周')) { if (daysUntil <= 0) daysUntil += 7; }
            else { if (daysUntil <= 0) daysUntil += 7; }
            target.setDate(target.getDate() + daysUntil);
        }
        const md = str.match(/(\d{1,2})月(\d{1,2})[日号]?/);
        if (md) { target.setMonth(parseInt(md[1]) - 1, parseInt(md[2])); if (target < now) target.setFullYear(target.getFullYear() + 1); }
        const time = parseTime(str);
        if (time) { target.setHours(time.hour, time.minute, 0, 0); }
        else if (/(?:上午|早上|早|凌晨)/.test(str)) target.setHours(9, 0, 0, 0);
        else if (/中午/.test(str)) target.setHours(11, 30, 0, 0);
        else if (/(?:下午|傍晚)/.test(str)) target.setHours(13, 30, 0, 0);
        else if (/(?:晚上|今晚|明晚)/.test(str)) target.setHours(18, 30, 0, 0);
        else {
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            if (target.getTime() === todayStart.getTime()) return null;
            target.setHours(23, 59, 0, 0);
        }
        if (target <= now) return null;
        return target.toISOString();
    }

    // ==================== 添加任务 ====================
    let isAdding = false;
    async function addNewTask() {
        if (isAdding) return;
        const rawText = taskInput.value.trim();
        if (!rawText) {
            inputGroup.classList.add('shake');
            setTimeout(() => inputGroup.classList.remove('shake'), 500);
            taskInput.focus();
            return;
        }
        isAdding = true;
        addBtn.classList.add('loading'); addBtn.textContent = '···';
        taskInput.disabled = true;

        let analysis = await analyzeTaskWithLLM(rawText);
        if (!analysis) {
            const local = extractTimeLocal(rawText);
            analysis = local || { taskType: 'deadline', label: rawText, category: '其他', priority: 1, notes: rawText, reminders: [30], hasDateTime: false, dateTime: null, cleanTask: rawText, isoTime: null };
        }

        addBtn.classList.remove('loading'); addBtn.textContent = '+ 添加';
        taskInput.disabled = false;
        isAdding = false;

        let dueTimestamp = null;
        if (analysis.hasDateTime) { dueTimestamp = analysis.isoTime || computeAbsoluteTime(analysis.dateTime); }

        const followupInterval = settings.followupInterval;
        const newTask = migrateTask({
            id: Date.now() + '-' + Math.random().toString(36).substring(2, 8),
            taskType: analysis.taskType || 'deadline',
            label: analysis.label || analysis.cleanTask || rawText,
            category: analysis.category || '其他',
            priority: analysis.priority || 1,
            notes: analysis.notes || rawText,
            reminders: analysis.reminders || getRemindersForCategory(analysis.category || '其他'),
            text: analysis.cleanTask || rawText,
            completed: false,
            createdAt: Date.now(),
            dueDate: analysis.hasDateTime ? analysis.dateTime : null,
            dueTimestamp: dueTimestamp,
            checkInterval: analysis.taskType === 'followup' ? followupInterval : null,
            nextCheckTime: analysis.taskType === 'followup' ? new Date(Date.now() + followupInterval * 60000).toISOString() : null,
            userImportant: null,
        });
        tasks.push(newTask);
        taskInput.value = '';
        taskInput.focus();
        renderAll();
        // 同步到服务器
        fetch('/api/sync-task', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ openid: 'web_user', task: newTask }),
        }).catch(() => {});
    }

    // ==================== 操作 ====================
    function deleteTaskById(id) { tasks = tasks.filter(t => t.id != id); renderAll(); }
    function toggleComplete(id, checked) { const t = tasks.find(t => t.id == id); if (t) { t.completed = checked; renderAll(); } }
    function clearCompletedTasks() {
        if (!tasks.some(t => t.completed)) {
            const toast = document.createElement('div');
            toast.textContent = '🎉 暂无已完成任务';
            Object.assign(toast.style, { position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)', backgroundColor: '#1e293b', color: 'white', padding: '8px 18px', borderRadius: '40px', fontSize: '0.8rem', zIndex: '999' });
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
            return;
        }
        tasks = tasks.filter(t => !t.completed);
        renderAll();
    }
    function starTask(id) {
        const t = tasks.find(t => t.id == id);
        if (!t) return;
        if (t.userImportant === true) t.userImportant = null;
        else t.userImportant = true;
        renderAll();
    }
    function checkFollowup(id) {
        const t = tasks.find(t => t.id == id);
        if (!t || t.taskType !== 'followup') return;
        const now = new Date();
        t.lastCheckTime = now.toISOString();
        if (!t.checkHistory) t.checkHistory = [];
        t.checkHistory.push({ time: now.toISOString(), status: 'checked' });
        t.nextCheckTime = new Date(now.getTime() + (t.checkInterval || settings.followupInterval) * 60000).toISOString();
        renderAll();
    }

    // ==================== 事件 ====================
    priorityListEl.addEventListener('click', e => {
        const del = e.target.closest('.p-del'); if (del && del.getAttribute('data-id')) { deleteTaskById(del.getAttribute('data-id')); return; }
        const star = e.target.closest('.star-toggle'); if (star && star.getAttribute('data-star-id')) { starTask(star.getAttribute('data-star-id')); return; }
    });
    priorityListEl.addEventListener('change', e => { if (e.target && e.target.type === 'checkbox' && e.target.classList.contains('p-check')) toggleComplete(e.target.getAttribute('data-id'), e.target.checked); });
    allTasksListEl.addEventListener('click', e => { const del = e.target.closest('.all-del'); if (del && del.getAttribute('data-id')) { deleteTaskById(del.getAttribute('data-id')); return; } });
    allTasksListEl.addEventListener('change', e => { if (e.target && e.target.type === 'checkbox' && e.target.classList.contains('all-check')) toggleComplete(e.target.getAttribute('data-id'), e.target.checked); });

    allTasksHeader.addEventListener('click', () => {
        allTasksCollapsed = !allTasksCollapsed;
        allTasksWrap.classList.toggle('collapsed', allTasksCollapsed);
        collapseIcon.classList.toggle('collapsed', allTasksCollapsed);
        collapseIcon.textContent = allTasksCollapsed ? '▸' : '▾';
    });

    addBtn.addEventListener('click', addNewTask);
    taskInput.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); addNewTask(); } });
    clearCompletedBtn.addEventListener('click', clearCompletedTasks);
    taskInput.addEventListener('focus', () => inputGroup.classList.remove('shake'));

    // ==================== 设置面板 ====================
    function openSettings() {
        document.getElementById('sEduCount').value = settings.education.reminders.length;
        if (settings.education.reminders[0]) document.getElementById('sEduR1').value = settings.education.reminders[0];
        if (settings.education.reminders[1]) document.getElementById('sEduR2').value = settings.education.reminders[1];
        document.getElementById('sWorkCount').value = settings.work.reminders.length;
        if (settings.work.reminders[0]) document.getElementById('sWorkR1').value = settings.work.reminders[0];
        if (settings.work.reminders[1]) document.getElementById('sWorkR2').value = settings.work.reminders[1];
        document.getElementById('sLifeCount').value = settings.life.reminders.length;
        if (settings.life.reminders[0]) document.getElementById('sLifeR1').value = settings.life.reminders[0];
        document.getElementById('sPlayCount').value = settings.play.reminders.length;
        document.getElementById('sFollowupInterval').value = settings.followupInterval;
        document.getElementById('sUrgentHigh').value = settings.urgentHigh;
        document.getElementById('sUrgentMid').value = settings.urgentMid;
        settingsPanel.classList.add('open'); settingsOverlay.classList.add('open');
    }
    function closeSettings() { settingsPanel.classList.remove('open'); settingsOverlay.classList.remove('open'); }
    gearBtn.addEventListener('click', openSettings);
    settingsClose.addEventListener('click', closeSettings);
    settingsOverlay.addEventListener('click', closeSettings);
    settingsSaveBtn.addEventListener('click', () => {
        settings = {
            education: { reminders: [parseInt(document.getElementById('sEduR1').value), parseInt(document.getElementById('sEduR2').value)].slice(0, parseInt(document.getElementById('sEduCount').value) || 0) },
            work: { reminders: [parseInt(document.getElementById('sWorkR1').value), parseInt(document.getElementById('sWorkR2').value)].slice(0, parseInt(document.getElementById('sWorkCount').value) || 0) },
            life: { reminders: [parseInt(document.getElementById('sLifeR1').value)].slice(0, parseInt(document.getElementById('sLifeCount').value) || 0) },
            play: { reminders: [].slice(0, parseInt(document.getElementById('sPlayCount').value) || 0) },
            followupInterval: parseInt(document.getElementById('sFollowupInterval').value) || 7200,
            urgentHigh: parseInt(document.getElementById('sUrgentHigh').value) || 4,
            urgentMid: parseInt(document.getElementById('sUrgentMid').value) || 24,
        };
        saveSettings(settings);
        closeSettings();
        tasks.forEach(t => { t.reminders = getRemindersForCategory(t.category); });
        renderAll();
    });

    // ==================== 启动 ====================
    function updateClock() {
        const now = new Date();
        const wn = ['日', '一', '二', '三', '四', '五', '六'];
        document.getElementById('clockTime').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
        document.getElementById('clockDate').textContent = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 周${wn[now.getDay()]}`;
    }
    updateClock(); setInterval(updateClock, 1000);

    async function loadInitialData() {
        loadFromStorage();
        // 优先从服务器拉取（微信添加的任务）
        try {
            const r = await fetch('/api/tasks');
            if (r.ok) {
                const data = await r.json();
                if (Array.isArray(data.tasks)) {
                    const apiTasks = data.tasks.map(migrateTask);
                    const seen = new Set(apiTasks.map(t => t.id));
                    tasks = [...apiTasks, ...tasks.filter(t => !seen.has(t.id))];
                    // 有服务器数据就同步到本地
                    saveToLocalStorage();
                }
            }
        } catch (e) { /* API 不可用，用 localStorage 数据 */ }
        // demo 数据只在首次且服务器无数据时加载一次
        const demoLoaded = localStorage.getItem('vibe_demo_loaded');
        if (tasks.length === 0 && !demoLoaded) {
            tasks = [
                migrateTask({ id: 'demo1', label: '试用智能分类', category: '其他', priority: 1, notes: '试试输入"明早八点开会"或"下周五提交ipa"', reminders: [30], text: '试用智能分类', completed: false, createdAt: Date.now() }),
                migrateTask({ id: 'demo2', label: '点击复选框标记完成', category: '生活琐事', priority: 2, notes: '完成的项会从建议排序中移除', reminders: [60], text: '点击复选框标记完成', completed: false, createdAt: Date.now() }),
            ];
            localStorage.setItem('vibe_demo_loaded', '1');
        }
        renderAll();
    }
    loadInitialData();

    setInterval(() => { renderPriorityList(); renderQuadrantChart(); }, 60000);
</script>
